services:
  postgres:
    image: ${POSTGRES_IMAGE:-docker.arvancloud.ir/library/postgres:16-alpine}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pro_reserve}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-pro_reserve}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-docker.arvancloud.ir/library/redis:7-alpine}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      target: development
      args:
        BASE_IMAGE: ${NODE_IMAGE:-docker.arvancloud.ir/library/node:20-bookworm}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PRISMA_SKIP_GENERATE: "0"
      RUN_MIGRATIONS: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-pro_reserve}?schema=public
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      SEED_SECRET: ${SEED_SECRET:-}
      ADMIN_MOBILES: ${ADMIN_MOBILES:-}
      JWT_SECRET: ${JWT_SECRET:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMS_URL: ${SMS_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_OTP_TEMPLATE_ID: ${SMS_OTP_TEMPLATE_ID:-}
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: ["sh", "docker/entrypoint.sh", "yarn", "dev:docker"]

  worker:
    build:
      context: .
      target: development
      args:
        BASE_IMAGE: ${NODE_IMAGE:-docker.arvancloud.ir/library/node:20-bookworm}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PRISMA_SKIP_GENERATE: "0"
      RUN_MIGRATIONS: "0"
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-pro_reserve}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      SEED_SECRET: ${SEED_SECRET:-change-me}
      ADMIN_MOBILES: ${ADMIN_MOBILES:-09111105440}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMS_URL: ${SMS_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_OTP_TEMPLATE_ID: ${SMS_OTP_TEMPLATE_ID:-}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: ["sh", "docker/entrypoint.sh", "yarn", "worker"]

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-reserv-market}_postgres_${POSTGRES_USER:-app}_${POSTGRES_DB:-pro_reserve}
  redis_data:
  node_modules:
  next_cache:
